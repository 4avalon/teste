<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual - Teste</title>
    <link rel="stylesheet" href="frontend/css/style.css"> <!-- Caminho ajustado para o CSS -->
</head>
<body>
    <header>
        <h1>Loja Virtual - Teste</h1>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="#loja">Loja</a></li>
                <li><a href="#carrinho">Carrinho</a></li>
                <li><a href="#admin">Administração</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Seção da Loja -->
        <section id="loja" aria-labelledby="produtos-title">
            <h2 id="produtos-title">Produtos Disponíveis</h2>
            <div id="produtos-container">
                <!-- Produtos serão carregados dinamicamente aqui -->
            </div>
        </section>

        <!-- Seção do Carrinho -->
        <section id="carrinho" aria-labelledby="carrinho-title">
            <h2 id="carrinho-title">Seu Carrinho</h2>
            <div id="carrinho-container">
                <!-- Itens do carrinho serão exibidos aqui -->
            </div>
            <p id="total-preco">Total: R$0,00</p>
            <button id="finalizar-compra">Finalizar Compra</button>
        </section>

        <!-- Seção Administrativa -->
        <section id="admin" aria-labelledby="admin-title">
            <h2 id="admin-title">Área Administrativa</h2>
            <form id="produto-form">
                <h3>Cadastrar Produto</h3>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                
                <label for="descricao">Descrição:</label>
                <textarea id="descricao" name="descricao" required></textarea>
                
                <label for="preco">Preço:</label>
                <input type="number" id="preco" name="preco" required>
                
                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" name="categoria" required>
                
                <label for="estoque">Estoque:</label>
                <input type="number" id="estoque" name="estoque" required>
                
                <label for="imagem">Imagem (URL):</label>
                <input type="text" id="imagem" name="imagem">
                
                <button type="submit">Cadastrar Produto</button>
            </form>
            <div id="admin-produtos-lista">
                <!-- Lista de produtos para editar ou deletar será carregada aqui -->
            </div>
        </section>
    </main>

    <footer>
        <p>© 2024 Loja Virtual - Teste</p>
    </footer>

    <!-- Carrega o JavaScript -->
    <script src="frontend/js/main.js" type="module"></script> <!-- Caminho ajustado para o JS principal -->
</body>
</html>
